<!DOCTYPE HTML>
<html>


<head>
    <title>Preview</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../assets/css/styles.css" type="text/css" rel="stylesheet">
    <link href="../assets/css/elements.css" type="text/css" rel="stylesheet">
    <link href="../assets/css/media-limits.css" type="text/css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/38ef0d6706.js" crossorigin="anonymous"></script>
    <script src="../assets/js/persistent-elements.js"></script>
    <script src="../assets/js/templates.js"></script>
    <script
        src="https://code.jquery.com/jquery-3.3.1.js"
        integrity="sha256-2Kok7MbOyxpgUVvAk/HJ2jigOSYS2auK4Pfzbm7uH60="
        crossorigin="anonymous">
    </script>
</head>

<body class="container preload">
    <div class="grid-container">
        <template-header></template-header>
        
        <template-sidebar data-collapse-sidebar></template-sidebar>

        <main>
            <div style="padding-top: 2rem;">
                <div class="msg" id="info">info example</div>
                <div class="msg" id="success">success example</div>
                <div class="msg" id="warning">warning example</div>
                <div class="msg" id="error">error example</div>
            </div>
        </main>

        <template-footer></template-footer>
    </div>

    <script> 
        $(function(){    
            let element = document.getElementById('preview');
            element.classList.add("active-page");
        });
    </script>
</body>
</html>
